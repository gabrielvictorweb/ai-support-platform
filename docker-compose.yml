version: "3.8"

services:
  bff:
    build:
      context: services/bff
    container_name: ai-support-bff
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      USERS_GRPC_URL: user:7000
      CONVERSATIONS_GRPC_URL: conversation:50052
      AGENTS_GRPC_URL: agent:50053
    depends_on:
      - user
      - conversation
      - agent
    networks:
      - ai-support

  conversation:
    build:
      context: services/conversation
    container_name: ai-support-conversation
    ports:
      - "3002:3000"
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://admin:admin@conversation-db:5432/conversation_db
      RABBITMQ_URL: amqp://admin:admin@ai-support-rabbitmq:5672
      RABBITMQ_QUEUE: conversation.queue
      GRPC_PORT: "50052"
      PORT: "3000"
    command: sh -c "npx prisma migrate deploy && node dist/src/main"
    networks:
      - ai-support

  user:
    build:
      context: services/user
    container_name: ai-support-user
    ports:
      - "8080:8080"
    environment:
      DB_URL: jdbc:postgresql://user-db:5432/user_db
      DB_USERNAME: admin
      DB_PASSWORD: admin
    networks:
      - ai-support

  agent:
    build:
      context: services/agent
    container_name: ai-support-agent
    ports:
      - "8000:8000"
      - "50053:50053"
    environment:
      GRPC_PORT: "50053"
      HTTP_PORT: "8000"
      MONGODB_URL: mongodb://admin:admin@ai-support-mongodb:27017
      MONGODB_DB: agent_db
      REDIS_URL: redis://ai-support-redis:6379
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      USE_LOCAL_VECTOR_SEARCH: "true"
    networks:
      - ai-support

networks:
  ai-support:
    external: true
