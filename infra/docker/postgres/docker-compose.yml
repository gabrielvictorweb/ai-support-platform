version: "3.8"

services:
    user-db:
        image: postgres:15
        environment:
            POSTGRES_USER: admin
            POSTGRES_PASSWORD: admin
            POSTGRES_DB: user_db
        ports:
            - "5433:5432"
        networks:
            - ai-support

    conversation-db:
        image: postgres:15
        environment:
            POSTGRES_USER: admin
            POSTGRES_PASSWORD: admin
            POSTGRES_DB: conversation_db
        ports:
            - "5434:5432"
        networks:
            - ai-support

networks:
    ai-support:
        external: true
