version: "3.8"

services:
    redis:
        image: redis:7.2-alpine
        container_name: ai-support-redis
        ports:
            - "6379:6379"
        command: ["redis-server", "--appendonly", "yes"]
        volumes:
            - redis_data:/data
        healthcheck:
            test: ["CMD", "redis-cli", "ping"]
            interval: 10s
            timeout: 5s
            retries: 5
        networks:
            - ai-support

volumes:
    redis_data:

networks:
    ai-support:
        external: true
