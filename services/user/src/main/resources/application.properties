spring.application.name=users
spring.config.import=optional:classpath:application-local.properties

spring.datasource.url=${DB_URL:}
spring.datasource.username=${DB_USERNAME:}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.sql.init.mode=never

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.flyway.enabled=true

management.endpoints.web.exposure.include=prometheus
management.endpoints.web.base-path=/
management.endpoints.web.path-mapping.prometheus=metrics
management.prometheus.metrics.export.enabled=true

grpc.server.port=7000
grpc.server.security.enabled=${GRPC_TLS_ENABLED:false}
grpc.server.security.certificateChain=file:${GRPC_SERVER_CERT:}
grpc.server.security.privateKey=file:${GRPC_SERVER_KEY:}
grpc.server.security.trustCertificateCollection=file:${GRPC_CA_CERT:}
grpc.server.security.clientAuth=REQUIRE
